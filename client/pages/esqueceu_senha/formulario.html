<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../../assets/imagens/LOGO-ICO.png" type="image/x-icon"/>
    <link rel="stylesheet" href="style.css" />
    <title>Mood - Cadastro</title>
  </head>
  <body>
    <div class="page-wrapper">
      <!-- LOGO -->
      <div class="logo-top">
        <!-- LOGO DESKTOP -->
        <img
        src="../../assets/imagens/MOOD-LGO.png"
        alt="Logo Mood"
        class="logo-desktop"
        />
        <!-- LOGO MOBILE -->
        <img
        src="../../assets/imagens/MOOD-LOGO-SEM-FUNDO.png"
        alt="Logo Mood"
        class="logo-mobile"
        />
      </div>
      <!-- CARD CADASTRO -->
      <div class="signup-container">
        <div class="logo">Entre hoje mesmo!</div>
        <form>
          <!-- EMAIL -->
          <div class="input-group">
            <label for="email">Email</label>
            <input
            type="email"
            id="email-input"
            placeholder="seu@email.com"
            autocomplete="email"
            required
            />
            <div class="error-message" id="emailError">Email inválido</div>
          </div>
          <button id="magic-link-btn" type="submit" class="signup-btn">Enviar</button>
          <div class="signup forgot">
            Já tem uma conta?
            <a href="../../../login/index.html"> Entrar com conta </a>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
<script type="module" src="formulario.js" defer></script>
</body>
</html>
